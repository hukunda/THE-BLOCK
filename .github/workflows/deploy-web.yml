# Build HTML5 in the cloud (no local Godot) and publish to GitHub Pages.
name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libfontconfig1 \
            libgl1 \
            libx11-6 \
            libxcursor1 \
            libxinerama1 \
            libxi6 \
            libxrandr2

      # Godot 4.3+ adds --import (reliable headless reimport). Still opens 4.2 projects.
      - name: Cache Godot + templates
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/godot/export_templates
            ./_godot_bin
          key: godot-4.3-stable-web-${{ runner.os }}-v3

      - name: Install Godot 4.3 + export templates
        run: |
          set -euxo pipefail
          mkdir -p _godot_bin
          if [ ! -x _godot_bin/godot ]; then
            curl -sL -o /tmp/godot.zip \
              "https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
            unzip -q /tmp/godot.zip -d _godot_bin
            chmod +x _godot_bin/Godot_v4.3-stable_linux.x86_64
            mv _godot_bin/Godot_v4.3-stable_linux.x86_64 _godot_bin/godot
          fi
          TPL="$HOME/.local/share/godot/export_templates"
          mkdir -p "$TPL"
          # Download only if we have neither a proper folder nor the flat layout from an old extract/cache.
          if [ ! -f "$TPL/4.3.stable/web_nothreads_release.zip" ] && [ ! -f "$TPL/web_nothreads_release.zip" ]; then
            curl -sL -o /tmp/templates.tpz \
              "https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
            unzip -q /tmp/templates.tpz -d /tmp/godot_export_tpl
            mv /tmp/godot_export_tpl/templates/* "$TPL/"
            rm -rf /tmp/godot_export_tpl
          fi
          ls -la "$TPL/"
          _godot_bin/godot --version

      # Godot requires .../export_templates/4.3.stable/web_nothreads_*.zip.
      # The .tpz often unpacks to a flat `templates/` (no version subdir) — or cache restores that layout.
      - name: Normalize export_templates → 4.3.stable
        run: |
          set -euxo pipefail
          BASE="$HOME/.local/share/godot/export_templates"
          mkdir -p "$BASE"
          cd "$BASE"
          if [ -f ./web_nothreads_release.zip ] && [ ! -f ./4.3.stable/web_nothreads_release.zip ]; then
            mkdir -p __godot_43__
            for x in *; do
              [ "$x" = "__godot_43__" ] && continue
              [ "$x" = "4.3.stable" ] && continue
              [ -e "$x" ] || continue
              mv "$x" __godot_43__/
            done
            rm -rf 4.3.stable
            mv __godot_43__ 4.3.stable
          fi
          if [ ! -f ./4.3.stable/web_nothreads_release.zip ]; then
            FOUND=$(find . -mindepth 1 -maxdepth 1 -type d -name '4.3*.stable' | head -1 | sed 's|^\./||')
            if [ -n "$FOUND" ] && [ -f "$FOUND/web_nothreads_release.zip" ]; then
              rm -rf 4.3.stable
              ln -sfn "$FOUND" 4.3.stable
            fi
          fi
          ls -la
          test -f 4.3.stable/web_nothreads_release.zip

      # --export-release implies --import on 4.3+ (imports fonts, etc. before packing).
      - name: Export Web
        run: |
          set -euxo pipefail
          mkdir -p export/web
          OUT="$GITHUB_WORKSPACE/export/web/index.html"
          _godot_bin/godot --headless --verbose --path "$GITHUB_WORKSPACE" --export-release "Web" "$OUT"
          test -f "$OUT"
          ls -la export/web

      # Project Pages live at https://<owner>.github.io/<repo>/ — without a path-only
      # <base href>, some browsers resolve ./index.wasm from the site root and 404.
      - name: Pages asset base + cache bust + sanity checks
        run: |
          set -euxo pipefail
          touch export/web/.nojekyll
          python3 scripts/github_pages_post_export.py
          test -f export/web/index.html
          test -f export/web/index.js
          test -f export/web/index.wasm
          python3 -c "import glob,sys; sys.exit(0 if glob.glob('export/web/index.*.*.pck') else 1)"
          ls -la export/web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: export/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
